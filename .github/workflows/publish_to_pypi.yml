name: Publish yutori to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: yutori-ai/yutori
          path: yutori-monorepo
          sparse-checkout: |
            scripts/brand/agent_logo_terminal/play.sh
            webapps/landing-page/public/AgentLogo4.webm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine pillow

      - name: Build package
        run: python -m build

      # install.sh is a build artifact assembled from install.sh.template +
      # an inlined banner and Navigator animation frames sourced from the
      # monorepo's play.sh. We always regenerate in CI so the uploaded asset
      # matches the tagged commit; the committed copy is informational.
      - name: Regenerate install.sh
        run: bash scripts/build_install.sh "$GITHUB_WORKSPACE/yutori-monorepo"

      - name: Check for drift in committed installer artifacts
        run: |
          if ! git diff --quiet -- install.sh assets/terminal/agent_logo_frames.txt 2>/dev/null; then
            echo "::warning::install.sh or assets/terminal/agent_logo_frames.txt changed during regeneration."
            git diff --stat -- install.sh assets/terminal/agent_logo_frames.txt || true
          fi

      - name: Generate installer checksums
        run: |
          chmod +x install.sh uninstall.sh
          sha256sum install.sh > install.sh.sha256
          sha256sum uninstall.sh > uninstall.sh.sha256

      - name: Publish to PyPI
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Upload installer assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            install.sh.sha256
            uninstall.sh
            uninstall.sh.sha256
