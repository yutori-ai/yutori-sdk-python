name: Publish yutori to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      # install.sh is regenerated from the committed template + banner +
      # frames so the uploaded release asset matches the tagged commit
      # deterministically. The committed install.sh is informational.
      # Brand/animation updates happen locally via:
      #   bash scripts/build_install.sh <path-to-yutori-monorepo>
      - name: Regenerate install.sh
        run: bash scripts/build_install.sh

      - name: Check for drift in committed install.sh
        run: |
          if ! git diff --quiet -- install.sh 2>/dev/null; then
            echo "::warning::install.sh drifted during regeneration. Run scripts/build_install.sh locally and commit the result."
            git diff --stat -- install.sh || true
          fi

      - name: Generate installer checksums
        run: |
          chmod +x install.sh uninstall.sh
          sha256sum install.sh > install.sh.sha256
          sha256sum uninstall.sh > uninstall.sh.sha256

      - name: Publish to PyPI
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Upload installer assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            install.sh.sha256
            uninstall.sh
            uninstall.sh.sha256
